<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="card">
    <h1>Study Tracker</h1>

    <p>
      Add study topics, mark them complete, filter your list, and track your progress.
    </p>

<section class="progress-section">
  <h2>Software Engineering Progress</h2>
  
  <h3>Topics to learn</h3>

  <div class="filter-buttons">
  <button id="showAllButton">All</button>
  <button id="showActiveButton">Active</button>
  <button id="showCompletedButton">Completed</button>
</div>

<label for="newTopicInput">New study topic</label>

<input id="newTopicInput" type="text" placeholder="Add a topic" />
<button id="addTopicButton">Add topic</button>

<ul id="topicList"></ul>

  <p id="progressText">Topics completed: 0</p>

  <p id="progressSummary">Completed: 0 of 0 topics</p>

<p id="progressPercent">Progress: 0%</p>

<div class="progress-bar-container">
  <div id="progressBar" class="progress-bar"></div>
</div>

<p id="progressMessage">Start by completing one topic.</p>

</section>
</main>

<script src="script.js?v=2"></script>
</body>
</html>
